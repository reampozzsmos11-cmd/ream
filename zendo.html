<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Zando Retail Clothing Store</title>
  <style>
    body { font-family: sans-serif; margin: 0; padding: 0; }
    header, footer { background: #f8f8f8; padding: 20px; text-align: center; }
    .brand-logos img { max-height: 80px; margin: 0 10px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; padding: 20px; }
    .grid-item { text-align: center; border: 1px solid #ddd; padding: 10px; }
    .grid-item img { max-width: 100%; height: auto; }
    footer { font-size: 0.9em; color: #555; }
  </style>
</head>
<body>

  <header>
    <div class="brand-logos">
      <img src="d:\html2\fashionshop\images\images\product (4).jpg" alt="Zando" />
      <img src="images/ten11-logo.png" alt="Ten11" />
      <img src="images/gatoni-logo.png" alt="Gatoni" />
      <img src="images/routine-logo.png" alt="Routine" />
      <img src="images/361sport-logo.png" alt="361° Sport" />
    </div>
    <h1>Welcome to Zando</h1>
    <p>Offering various original fashion brands in Phnom Penh &amp; Siem Reap.</p>
  </header>

  <section class="grid">
    <div class="grid-item">
      <img src="images/category-1.jpg" alt="Category 1">
      <h3>Women Jumpsuits</h3>
    </div>
    <div class="grid-item">
      <img src="images/category-2.jpg" alt="Category 2">
      <h3>Bras</h3>
    </div>
    <div class="grid-item">
      <img src="images/category-3.jpg" alt="Category 3">
      <h3>Jeans</h3>
    </div>
    <div class="grid-item">
      <img src="images/category-4.jpg" alt="Category 4">
      <h3>Shoes</h3>
    </div>
    <!-- Add more as needed -->
  </section>

  <footer>
    <p>Contact us: info@zandokh.com | (+855) 081 999 716 | (+855) 061 330 330</p>
    <p>&copy; 2015–2025 Zando. All rights reserved.</p>
  </footer>

</body>
</html>
